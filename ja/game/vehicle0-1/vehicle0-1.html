<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>擬似3Dドライブ</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: skyblue;
}

canvas {
  display: block;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let speed = 2;
let offset = 0;
let playerX = 0;

// 操作（スマホ＆PC）
document.addEventListener("touchmove", e => {
  playerX = (e.touches[0].clientX - canvas.width / 2) / 10;
});
document.addEventListener("mousemove", e => {
  playerX = (e.clientX - canvas.width / 2) / 10;
});

// 描画
function drawRoad() {
  const horizon = canvas.height * 0.4;

  for (let i = 0; i < 100; i++) {
    let z = i + offset;
    let scale = 1 / z * 200;

    let y = horizon + scale * 200;
    let roadWidth = scale * 500;

    ctx.fillStyle = i % 2 === 0 ? "#555" : "#666";

    ctx.fillRect(
      canvas.width / 2 - roadWidth / 2 + playerX,
      y,
      roadWidth,
      4
    );
  }
}

// ループ
function update() {
  offset += speed;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
