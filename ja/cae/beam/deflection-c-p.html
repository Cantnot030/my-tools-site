<h1>片持ち梁（先端集中荷重）</h1>

<div style="text-align:center;">
<img src="/svg/beam-def-c-p.svg" width="600">
<h2>δ = PL³ / 3EI</h2>
</div>

<label>荷重 P (N)</label><br>
<input id="P" type="number"><br>

<label>梁長さ L (m)</label><br>
<input id="L" type="number"><br>

<label>ヤング率 E (Pa)</label><br>
<input id="E" type="number"><br>

<label>断面2次モーメント I (m⁴)</label><br>
<input id="I" type="number"><br>

<button onclick="calc()">計算</button>

<h3 id="result"></h3>

<script>

function calc(){

let P = parseFloat(document.getElementById("P").value);
let L = parseFloat(document.getElementById("L").value);
let E = parseFloat(document.getElementById("E").value);
let I = parseFloat(document.getElementById("I").value);

let delta = (P*Math.pow(L,3))/(3*E*I);

document.getElementById("result").innerHTML =
"最大たわみ = " + delta.toExponential(3) + " m";

}

</script>

</body>
