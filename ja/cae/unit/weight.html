<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/breadcrumb.css">
<title>重さ単位変換 | Weight Unit Converter</title>

<style>
input, select, button{
width:100px;
padding:8px;
margin:5px;
font-size:16px;
}

.result{
max-width:300px;
margin-top:20px;
padding:10px;
background:#f5f5f5;
}
</style>

</head>
<body>

<h1>重さ単位変換</h1>

<p>値を入力し、単位を選択してください。</p>

<input type="number" id="value" placeholder="数値">

<select id="unit">
<option value="mg">mg</option>  
<option value="g">g</option>
<option value="kg">kg</option>
<option value="lb">lb</option>
<option value="oz">oz</option>
</select>

<button onclick="convert()">変換</button>

<div class="result" id="result"></div>

<script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let kgram;

switch(unit){ 

case "kg":
kgram = value;
break;

case "g":
kgram = value / 1000;
break;

case "mg":
kgram = value / 1000000;
break;

case "lb":
kgram = value / 2.20462;
break;

case "oz":
kgram = value / 35.274;
break;

}

let g = kgram * 1000;
let mg = kgram * 1000000;
let lb = kgram * 2.20462;
let oz = kgram * 35.274;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

mg : ${mg.toFixed(4)} <br>
g : ${g.toFixed(4)} <br>
kg : ${kgram.toFixed(4)} <br>
lb : ${lb.toFixed(6)} <br>
oz : ${oz.toFixed(4)} <br>

`;

}

</script>

</body>
</html>
