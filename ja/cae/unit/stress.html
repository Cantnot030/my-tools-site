<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/breadcrumb.css">
<title>応力単位変換 | Stress Unit Converter</title>

<style>
input, select, button{
width:100px;
padding:8px;
margin:5px;
font-size:16px;
}

.result{
max-width:300px;
margin-top:20px;
padding:10px;
background:#f5f5f5;
}
</style>

</head>
<body>

<!-- パンくず -->
<nav class="breadcrumb">
  <a href="/">Top</a> &gt;
  <a href="/ja/cae/cae-tools.html">CAEツール</a> &gt;
  <a href="/ja/cae/unit/unit-converter.html">単位変換ツール</a> &gt;
  <span>応力単位変換</span>
</nav>

<h1>応力単位変換</h1>

<p>値を入力し、単位を選択してください。</p>

<input type="number" id="value" placeholder="数値">

<select id="unit">
<option value="Pa">Pa</option>  
<option value="kPa">kPa</option>
<option value="MPa">MPa</option>
<option value="GPa">GPa</option>
<option value="Nmm2">Nmm2</option>
<option value="kNm2">kNm2</option>
<option value="kgfcm2">kgfcm2</option>
<option value="kgfmm2">kgfmm2</option>
<option value="psi">psi</option>
</select>



<button onclick="convert()">変換</button>

<div class="result" id="result"></div>

<script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let kgram;

switch(unit){ 

case "Pa":
pascal = value;
break;

case "kPa":
pascal = value * 1000;
break;

case "MPa":
pascal = value * 1000000;
break;

case "GPa":
pascal = value * 1000000000;
break;

case "Nmm2":
pascal = value * 1000000;
break;

case "kNm2":
pascal = value * 1000;
break;

case "kgfcm2":
pascal = value * 98066.5;
break;

case "kgfmm2":
pascal = value * 9806650;
break;

case "psi":
pascal = value * 6894.76;
break;

}

let kPa = pascal / 1000;
let MPa = pascal / 1000000;
let GPa = pascal / 1000000000;
let Nmm2 = pascal / 1000000;
let kNm2 = pascal / 1000;
let kgfcm2 = pascal / 98066.5;
let kgfmm2 = pascal / 9806650;
let psi = pascal / 6894.76;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

Pa : ${pascal.toFixed(4)} <br>
kPa : ${kPa.toFixed(4)} <br>
MPa : ${MPa.toFixed(4)} <br>
GPa : ${GPa.toFixed(4)} <br>
Nmm2 : ${Nmm2.toFixed(4)} <br>
kNm2 : ${kNm2.toFixed(4)} <br>
kgfcm2 : ${kgfcm2.toFixed(4)} <br>
kgfmm2 : ${kgfmm2.toFixed(4)} <br>
psi : ${psi.toFixed(4)} <br>

`;

}

</script>

</body>
</html>
