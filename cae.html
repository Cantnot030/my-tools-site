<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAEツール</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h1>CAE 簡易ツール</h1>



<div class="container">
    
  <button onclick="calc()">計算</button>
    

  <!-- 左：入力 -->
  <div class="input-panel">

    <h2>G = E / (2 * (1 + ν))</h2>

　　  <p>E: <input type="number" id="E"></p>
　　  <p>ν: <input type="number" id="nu" step="0.01"></p>

　　  <p>G = <span id="resultG"></span></p>

　　<hr>

    <h2>② kN → tf 変換</h2>

    <p>kN: <input type="number" id="kN"></p>

    <p>tf = <span id="resulttf"></span></p>

  </div>


  <!-- 右：説明 -->
  <div class="info-panel">

    <h2>パラメータ説明</h2>

    <p><b>E</b> : ヤング係数</p>
    <p><b>G</b> : せん断弾性係数</p>
    <p><b>ν</b> : ポアソン比</p>

    <p>
    説明
    </p>

  </div>


<script>

function calc() {

let E = parseFloat(document.getElementById("E").value);
let nu = parseFloat(document.getElementById("nu").value);

let G = E / (2 * (1 + nu));

document.getElementById("resultG").innerText = G;

let kN = parseFloat(document.getElementById("kN").value);

let tf = kN / 9.80665;

document.getElementById("resulttf").innerText = tf;

}

</script>

</body>
</html>
